<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jetzon Language - Jetcity</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .letter-section {
            background: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 800px;
        }
        .letter-section h2 {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .upload-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 0;
        }
        input[type="file"] {
            padding: 5px;
        }
        .image-display {
            max-width: 200px;
            max-height: 200px;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: none;
        }
        .audio-controls {
            margin: 10px 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <header>
        <h1>Jetzon Language Alphabet</h1>
        <p>Explore the 26 letters of Jetzon with images and pronunciations</p>
    </header>

    <div id="alphabet">
        <!-- Letters will be generated by JavaScript -->
    </div>

    <script>
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const alphabetDiv = document.getElementById('alphabet');

        letters.forEach(letter => {
            const section = document.createElement('div');
            section.className = 'letter-section';
            let sectionHtml = '';
            let audioSrc = `jetzon_audio/${letter}.mp3`;
            if (letter === 'A') {
                audioSrc = 'jetzon_audio/A.wav';
            } else if (letter === 'B') {
                audioSrc = 'jetzon_audio/output (9).wav';
            }
            let imageSrc = `jetzon_images/${letter}.png`;
            if (letter === 'A') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 091807.png';
            } else if (letter === 'B') {
                imageSrc = 'jetzon_images/image.png';
            } else if (letter === 'C') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 144645.png';
            } else if (letter === 'D') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 145211.png';
            } else if (letter === 'E') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 145556.png';
            } else if (letter === 'F') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 153106.png';
            } else if (letter === 'G') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 153345.png';
            } else if (letter === 'H') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 153630.png';
            } else if (letter === 'I') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 153936.png';
            } else if (letter === 'J') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 154544.png';
            } else if (letter === 'K') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 154822.png';
            } else if (letter === 'L') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 155044.png';
            } else if (letter === 'M') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 155236.png';
            } else if (letter === 'N') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 155405.png';
            } else if (letter === 'O') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 155539.png';
            } else if (letter === 'P') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 155954.png';
            } else if (letter === 'Q') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 160204.png';
            } else if (letter === 'R') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 160342.png';
            } else if (letter === 'S') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 160540.png';
            } else if (letter === 'T') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 160722.png';
            } else if (letter === 'U') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 161041.png';
            } else if (letter === 'V') {
                imageSrc = 'jetzon_images/Screenshot 2026-03-18 161347.png';
            }
            sectionHtml = `
                <h2>Letter ${letter}</h2>
                <div class="upload-area">
                    <label>Image for ${letter}:</label>
                    <img class="image-display" alt="Preview for ${letter}" src="${imageSrc}" style="display:block;" onerror="this.style.display='none'">
                </div>
                <div class="upload-area">
                    <label>Pronunciation for ${letter}:</label>
                    <div class="audio-controls">
                        <audio id="audio-player-${letter}" src="${audioSrc}" controls></audio>
                    </div>
                </div>
            `;
            section.innerHTML = sectionHtml;
            alphabetDiv.appendChild(section);
        });



        // No playAudio function needed anymore since audio controls are always visible
    </script>
</body>
</html></content>
